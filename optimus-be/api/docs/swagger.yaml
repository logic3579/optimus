basePath: /api/v1
definitions:
  internal_modules_auth.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  internal_modules_auth.LogoutRequest:
    properties:
      refresh_token:
        type: string
    type: object
  internal_modules_auth.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_modules_menu.CreateRequest:
    properties:
      code:
        maxLength: 64
        minLength: 2
        type: string
      component:
        maxLength: 255
        type: string
      hidden:
        type: boolean
      icon:
        maxLength: 64
        type: string
      name:
        maxLength: 128
        type: string
      parent_id:
        type: integer
      path:
        maxLength: 255
        type: string
      permission_code:
        maxLength: 128
        type: string
      sort_order:
        type: integer
    required:
    - code
    - name
    type: object
  internal_modules_menu.UpdateRequest:
    properties:
      component:
        maxLength: 255
        type: string
      hidden:
        type: boolean
      icon:
        maxLength: 64
        type: string
      name:
        maxLength: 128
        type: string
      parent_id:
        type: integer
      path:
        maxLength: 255
        type: string
      permission_code:
        maxLength: 128
        type: string
      sort_order:
        type: integer
    type: object
  internal_modules_role.CreateRequest:
    properties:
      code:
        maxLength: 64
        minLength: 2
        type: string
      description:
        maxLength: 512
        type: string
      name:
        maxLength: 128
        type: string
    required:
    - code
    - name
    type: object
  internal_modules_role.SetPermissionsRequest:
    properties:
      permission_codes:
        items:
          type: string
        type: array
    required:
    - permission_codes
    type: object
  internal_modules_role.UpdateRequest:
    properties:
      description:
        maxLength: 512
        type: string
      name:
        maxLength: 128
        type: string
    type: object
  internal_modules_user.CreateRequest:
    properties:
      display_name:
        maxLength: 128
        type: string
      email:
        maxLength: 128
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
      role_ids:
        items:
          type: integer
        type: array
      username:
        maxLength: 64
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  internal_modules_user.SetPasswordRequest:
    properties:
      password:
        maxLength: 128
        minLength: 8
        type: string
    required:
    - password
    type: object
  internal_modules_user.SetRolesRequest:
    properties:
      role_ids:
        items:
          type: integer
        type: array
    required:
    - role_ids
    type: object
  internal_modules_user.SetStatusRequest:
    properties:
      status:
        enum:
        - enabled
        - disabled
        type: string
    required:
    - status
    type: object
  internal_modules_user.UpdateRequest:
    properties:
      avatar_url:
        maxLength: 512
        type: string
      display_name:
        maxLength: 128
        type: string
      email:
        maxLength: 128
        type: string
    type: object
  optimus-be_internal_infra_response.Envelope:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      message_key:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    P0 admin backend for Optimus — auth, RBAC, users, roles, permissions, menus, audit.
    All authenticated endpoints expect `Authorization: Bearer <access_token>`.
