        in: query
        name: action
        type: string
      - description: filter by actor user ID
        in: query
        name: user_id
        type: integer
      - description: start time (RFC3339)
        in: query
        name: start
        type: string
      - description: end time (RFC3339)
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/optimus-be_internal_infra_response.Envelope'
        "400":
          description: Bad Request
