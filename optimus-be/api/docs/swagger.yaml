basePath: /api/v1
definitions:
  internal_modules_apps_application.CreateRequest:
    properties:
      chart_name:
        maxLength: 128
        type: string
      chart_repo_id:
        type: integer
      cluster_id:
        type: integer
      description:
        maxLength: 4096
        type: string
      name:
        maxLength: 64
        type: string
      namespace:
        maxLength: 63
        type: string
      owner_user_id:
        type: integer
      release_name:
        maxLength: 53
        type: string
      tags:
        items:
          type: string
        type: array
    required:
    - chart_name
    - chart_repo_id
    - cluster_id
    - name
    - namespace
    - release_name
    type: object
  internal_modules_apps_application.UpdateRequest:
    properties:
      description:
        maxLength: 4096
        type: string
      owner_user_id:
        type: integer
      tags:
        items:
          type: string
        type: array
    type: object
  internal_modules_apps_release.InstallRequest:
    properties:
      chart_version:
        maxLength: 64
        type: string
      values_yaml:
        description: 1 MiB cap
        maxLength: 1048576
        type: string
    required:
    - chart_version
    type: object
  internal_modules_apps_release.RollbackRequest:
    properties:
      revision:
        minimum: 1
        type: integer
    required:
    - revision
    type: object
  internal_modules_apps_release.UninstallRequest:
    properties:
      keep_history:
        type: boolean
    type: object
  internal_modules_apps_release.UpgradeRequest:
    properties:
      chart_repo_id:
        type: integer
      chart_version:
        maxLength: 64
        type: string
      values_yaml:
        maxLength: 1048576
        type: string
    required:
    - chart_version
    type: object
  internal_modules_apps_repo.CreateRequest:
    properties:
      description:
        maxLength: 4096
        type: string
      name:
        maxLength: 64
        type: string
      password:
        type: string
      type:
        enum:
        - oci
        - http
        type: string
      url:
        maxLength: 2048
        type: string
      username:
        maxLength: 255
        type: string
    required:
    - name
    - type
    - url
    type: object
  internal_modules_apps_repo.UpdateRequest:
    properties:
      description:
        maxLength: 4096
        type: string
      name:
        maxLength: 64
        type: string
      password:
        type: string
      url:
        maxLength: 2048
        type: string
      username:
        maxLength: 255
        type: string
    type: object
  internal_modules_auth.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  internal_modules_auth.LogoutRequest:
    properties:
      refresh_token:
        type: string
    type: object
  internal_modules_auth.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_modules_credentials_cloudkey.CreateRequest:
    properties:
      access_key_id:
        maxLength: 256
        type: string
      description:
        maxLength: 4096
        type: string
      name:
        maxLength: 128
        type: string
      provider:
        enum:
        - aws
        - gcp
        - azure
        type: string
      region:
        maxLength: 32
        type: string
      secret_access_key:
        type: string
    required:
    - access_key_id
    - name
    - provider
    - secret_access_key
    type: object
  internal_modules_credentials_cloudkey.UpdateRequest:
    properties:
      access_key_id:
        maxLength: 256
        type: string
      description:
        maxLength: 4096
        type: string
      name:
        maxLength: 128
        type: string
      provider:
        enum:
        - aws
        - gcp
        - azure
        type: string
      region:
        maxLength: 32
        type: string
      secret_access_key:
        type: string
    type: object
  internal_modules_credentials_kubeconfig.CreateRequest:
    properties:
      default_namespace:
        maxLength: 64
        type: string
      description:
        maxLength: 4096
        type: string
      kubeconfig:
        type: string
      name:
        maxLength: 128
        type: string
    required:
    - kubeconfig
    - name
    type: object
  internal_modules_credentials_kubeconfig.UpdateRequest:
    properties:
      default_namespace:
        maxLength: 64
        type: string
      description:
        maxLength: 4096
        type: string
      kubeconfig:
        type: string
      name:
        maxLength: 128
        type: string
    type: object
  internal_modules_credentials_sshkey.CreateRequest:
    properties:
      description:
        maxLength: 4096
        type: string
      name:
        maxLength: 128
        type: string
      passphrase:
        type: string
      private_key:
        type: string
      username:
        maxLength: 64
        type: string
    required:
    - name
    - private_key
    - username
    type: object
  internal_modules_credentials_sshkey.UpdateRequest:
    properties:
      description:
        maxLength: 4096
        type: string
      name:
        maxLength: 128
        type: string
      passphrase:
        type: string
      private_key:
        type: string
      username:
        maxLength: 64
        type: string
    type: object
  internal_modules_k8s_cluster.CreateRequest:
    properties:
      context:
        maxLength: 128
        type: string
      description:
        maxLength: 4096
        type: string
      kubeconfig_id:
        type: integer
      name:
        maxLength: 64
        type: string
      tags:
        items:
          type: string
        type: array
    required:
    - context
    - kubeconfig_id
    - name
    type: object
  internal_modules_k8s_cluster.UpdateRequest:
    properties:
      context:
        maxLength: 128
        type: string
      description:
        maxLength: 4096
        type: string
      kubeconfig_id:
        type: integer
      name:
        maxLength: 64
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
  internal_modules_menu.CreateRequest:
    properties:
      code:
        maxLength: 64
        minLength: 2
        type: string
      component:
        maxLength: 255
        type: string
      hidden:
        type: boolean
      icon:
        maxLength: 64
        type: string
      name:
        maxLength: 128
        type: string
      parent_id:
        type: integer
      path:
        maxLength: 255
        type: string
      permission_code:
        maxLength: 128
        type: string
      sort_order:
        type: integer
    required:
    - code
    - name
    type: object
  internal_modules_menu.UpdateRequest:
    properties:
      component:
        maxLength: 255
        type: string
      hidden:
        type: boolean
      icon:
        maxLength: 64
        type: string
      name:
        maxLength: 128
        type: string
      parent_id:
        type: integer
      path:
        maxLength: 255
        type: string
      permission_code:
        maxLength: 128
        type: string
      sort_order:
        type: integer
    type: object
  internal_modules_rbac.ChangePasswordRequest:
    properties:
      new_password:
        maxLength: 128
        minLength: 8
        type: string
      old_password:
        maxLength: 128
        minLength: 1
        type: string
    required:
    - new_password
    - old_password
    type: object
  internal_modules_rbac.UpdateMeRequest:
    properties:
      avatar_url:
        maxLength: 512
        type: string
      display_name:
        maxLength: 128
        type: string
      email:
        maxLength: 128
        type: string
    type: object
  internal_modules_role.CreateRequest:
    properties:
      code:
        maxLength: 64
        minLength: 2
        type: string
      description:
        maxLength: 512
        type: string
      name:
        maxLength: 128
        type: string
    required:
    - code
    - name
    type: object
  internal_modules_role.SetPermissionsRequest:
    properties:
      permission_codes:
        items:
          type: string
        type: array
    required:
    - permission_codes
    type: object
  internal_modules_role.UpdateRequest:
    properties:
      description:
        maxLength: 512
        type: string
      name:
        maxLength: 128
        type: string
    type: object
  internal_modules_user.CreateRequest:
    properties:
      display_name:
        maxLength: 128
        type: string
      email:
        maxLength: 128
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
      role_ids:
        items:
          type: integer
        type: array
      username:
        maxLength: 64
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  internal_modules_user.SetPasswordRequest:
    properties:
      password:
        maxLength: 128
        minLength: 8
        type: string
    required:
    - password
    type: object
  internal_modules_user.SetRolesRequest:
    properties:
      role_ids:
        items:
          type: integer
        type: array
    required:
    - role_ids
    type: object
  internal_modules_user.SetStatusRequest:
    properties:
      status:
        enum:
        - enabled
        - disabled
        type: string
    required:
    - status
    type: object
  internal_modules_user.UpdateRequest:
    properties:
      avatar_url:
        maxLength: 512
        type: string
      display_name:
        maxLength: 128
        type: string
      email:
        maxLength: 128
        type: string
    type: object
  optimus-be_internal_infra_response.Envelope:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      message_key:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    P0 admin backend for Optimus — auth, RBAC, users, roles, permissions, menus, audit.
    All authenticated endpoints expect `Authorization: Bearer <access_token>`.
  title: Optimus Admin API
  version: "1.0"
paths:
  /apps/applications:
    get:
      parameters:
      - description: page (default 1)
        in: query
        name: page
        type: integer
      - description: page size (default 20)
        in: query
        name: page_size
        type: integer
      - description: name substring (ILIKE)
        in: query
        name: name
        type: string
      - description: filter by cluster id
        in: query
        name: cluster_id
        type: integer
      - description: filter by namespace
        in: query
        name: namespace
        type: string
      - description: filter by owner user id
        in: query
        name: owner_user_id
        type: integer
      - description: tag containment filter (charset [a-zA-Z0-9_.-])
        in: query
        name: tag
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/optimus-be_internal_infra_response.Envelope'
      security:
      - BearerAuth: []
      summary: List applications
      tags:
      - apps
    post:
      consumes:
      - application/json
      parameters:
      - description: application payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_apps_application.CreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/optimus-be_internal_infra_response.Envelope'
      security:
      - BearerAuth: []
      summary: Create application
      tags:
      - apps
  /apps/applications/{id}:
    delete:
      parameters:
      - description: application ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/optimus-be_internal_infra_response.Envelope'
      security:
      - BearerAuth: []
      summary: Delete application
      tags:
      - apps
    get:
      parameters:
      - description: application ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/optimus-be_internal_infra_response.Envelope'
      security:
      - BearerAuth: []
      summary: Get application
      tags:
      - apps
    put:
      consumes:
      - application/json
      parameters:
      - description: application ID
        in: path
        name: id
        required: true
        type: integer
      - description: application payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_apps_application.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
