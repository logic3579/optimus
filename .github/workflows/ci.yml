name: ci
on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: optimus
          POSTGRES_PASSWORD: optimus
          POSTGRES_DB: optimus
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U optimus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: optimus-be/go.sum

      - name: go mod download
        working-directory: optimus-be
        run: go mod download

      - name: install tools
        working-directory: optimus-be
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          go install github.com/swaggo/swag/cmd/swag@v1.16.4
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.7

      - name: lint
        working-directory: optimus-be
        run: golangci-lint run --timeout 5m

      - name: unit tests (no dbtest)
        working-directory: optimus-be
        run: go test ./... -race -cover

      - name: dbtest (with real Postgres via dockertest)
        working-directory: optimus-be
        run: go test ./... -tags=dbtest -race -count=1

      - name: swagger-diff
        working-directory: optimus-be
        run: make swagger-diff

      - name: perm-check
        working-directory: optimus-be
        run: make perm-check

      - name: gosec
        working-directory: optimus-be
        run: gosec -severity medium -confidence medium -quiet ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: optimus-fe
    steps:
      - uses: actions/checkout@v4
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: i18n keys
        run: bun run i18n:check
      - name: Unit tests
        run: bun run test
      - name: Build
        run: bun run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: build optimus-be (server)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/be.Dockerfile
          target: server
          push: false
          load: false
          cache-from: type=gha,scope=be-server
          cache-to: type=gha,mode=max,scope=be-server
          build-args: |
            VERSION=${{ github.sha }}

      - name: build optimus-be (migrate)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/be.Dockerfile
          target: migrate
          push: false
          load: false
          cache-from: type=gha,scope=be-migrate
          cache-to: type=gha,mode=max,scope=be-migrate

      - name: build optimus-be (seed)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/be.Dockerfile
          target: seed
          push: false
          load: false
          cache-from: type=gha,scope=be-seed
          cache-to: type=gha,mode=max,scope=be-seed

      - name: build optimus-fe
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/fe.Dockerfile
          push: false
          load: false
          cache-from: type=gha,scope=fe
          cache-to: type=gha,mode=max,scope=fe
