name: ci
on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: optimus
          POSTGRES_PASSWORD: optimus
          POSTGRES_DB: optimus
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U optimus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: optimus-be/go.sum

      - name: go mod download
        working-directory: optimus-be
        run: go mod download

      - name: install tools
        working-directory: optimus-be
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.61.0
          go install github.com/swaggo/swag/cmd/swag@v1.16.4
          go install github.com/securego/gosec/v2/cmd/gosec@v2.21.4

      - name: lint
        working-directory: optimus-be
        run: golangci-lint run --timeout 5m

      - name: unit tests (no dbtest)
        working-directory: optimus-be
        run: go test ./... -race -cover

      - name: dbtest (with real Postgres via dockertest)
        working-directory: optimus-be
        run: go test ./... -tags=dbtest -race -count=1

      - name: swagger-diff
        working-directory: optimus-be
        run: make swagger-diff

      - name: perm-check
        working-directory: optimus-be
        run: make perm-check

      - name: gosec
        working-directory: optimus-be
        run: gosec -severity medium -confidence medium -quiet ./...
